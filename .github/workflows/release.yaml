name: CI and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and test
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          USERNAME=scd
          USER_UID=1000
          USER_GID=1000

    - name: Process COCO dataset
      run: |
        docker run --name coco_processor \
          -v ${{ github.workspace }}/data:/app/data \
          ghcr.io/${{ github.repository }}:latest \
          poetry run python ingest-coco.py

    - name: Prepare release
      run: |
        cd data
        zip -r coco_dataset.zip coco/
        echo "# COCO Dataset Release" > RELEASE_NOTES.md
        echo "This release contains the COCO dataset processed for person detection." >> RELEASE_NOTES.md
        echo "## Contents" >> RELEASE_NOTES.md
        echo "- Training images: data/coco/train" >> RELEASE_NOTES.md
        echo "- Validation images: data/coco/val" >> RELEASE_NOTES.md
        echo "- COCO annotations: data/coco/annotations" >> RELEASE_NOTES.md
        echo "## Dataset Size" >> RELEASE_NOTES.md
        du -sh coco/ >> RELEASE_NOTES.md
        date +"## Release Date: %Y-%m-%d" >> RELEASE_NOTES.md
        echo "## Package Info" >> RELEASE_NOTES.md
        echo "\`\`\`" >> RELEASE_NOTES.md
        docker run --rm ghcr.io/${{ github.repository }}:latest poetry version >> RELEASE_NOTES.md
        echo "\`\`\`" >> RELEASE_NOTES.md

    - name: Get version info
      id: info
      run: |
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        echo "version=$(docker run --rm ghcr.io/${{ github.repository }}:latest poetry version -s)" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          data/coco_dataset.zip
        body_path: data/RELEASE_NOTES.md
        tag_name: v${{ steps.info.outputs.version }}-${{ steps.info.outputs.date }}
        name: COCO Dataset ${{ steps.info.outputs.version }} (${{ steps.info.outputs.date }})
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release notes
      uses: actions/upload-artifact@v3
      with:
        name: release-notes
        path: data/RELEASE_NOTES.md